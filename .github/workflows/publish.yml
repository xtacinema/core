name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions: # ⬅️ ОБЯЗАТЕЛЬНО ЗДЕСЬ
      contents: read
      id-token: write # ⬅️ КЛЮЧ

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm publish --access public --provenance
